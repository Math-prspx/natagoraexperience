<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Taxonomie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin-v2.css">
</head>
<body data-admin-page="taxonomy">
  <div class="admin-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html">NATAGORA ADMIN</a>
      <a class="back-site" href="../index.html">Retour au site public</a>
      <button type="button" class="back-site" onclick="window.AdminV2.logout()" style="cursor:pointer;background:none;border:none;text-align:left;width:100%;color:inherit">Déconnexion</button>
      <nav class="side-nav" aria-label="Navigation admin">
        <a data-nav="dashboard" href="index.html">Dashboard</a>
        <a data-nav="walks" href="walks.html">Promenades</a>
        <a data-nav="occurrences" href="occurrences.html">Occurrences</a>
        <a data-nav="places" href="places.html">Reserves</a>
        <a data-nav="taxonomy" href="taxonomie.html">Taxonomie</a>
        <a data-nav="settings" href="settings.html">Parametres</a>
      </nav>
    </aside>

    <div class="main">
      <header class="main-header">
        <div>
          <h1>Taxonomie</h1>
          <p>Gestion des sous-catégories reutilisees par les promenades.</p>
        </div>
      </header>

      <main class="main-content">
        <section class="panel stack">
          <section class="form-group-block">
            <h2>1. Modifier sous-categorie</h2>
            <form id="subcategoryForm" class="stack">
              <h3 id="subcategoryFormTitle">Nouvelle sous-categorie</h3>
              <input type="hidden" id="subcategoryId" name="id">
              <label>Nom
                <input name="name_fr" required>
              </label>
              <label>Slug
                <input name="slug" placeholder="botanique">
              </label>
              <div class="grid-2">
                <button id="subcategorySaveBtn" type="submit">Ajouter sous-categorie</button>
                <button id="subcategoryResetBtn" class="btn btn-secondary" type="button">Nouvelle sous-categorie</button>
              </div>
            </form>
          </section>

          <div class="form-divider" aria-hidden="true"></div>

          <section class="form-group-block">
            <h2>2. Sous-catégories existantes</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Nom</th>
                    <th>Slug</th>
                    <th>Utilisation</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="subcategoriesBody"></tbody>
              </table>
            </div>
          </section>
        </section>

        <p id="status" class="status"></p>
      </main>
    </div>
  </div>

  <script src="../assets/js/admin-v2-common.js" defer></script>
  <script src="../assets/js/admin-taxonomie.js" defer></script>
</body>
</html>
